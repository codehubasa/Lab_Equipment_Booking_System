<!DOCTYPE html>
<html>
<head>
    <title>Lab Booking Success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0b1220, #1e293b, #2f3e52);
            overflow: hidden;
        }

        /* 🔥 Animated Background */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: float 12s infinite ease-in-out;
        }

        .blob1 { width:400px;height:400px;background:#2563eb;top:-100px;left:-100px; }
        .blob2 { width:300px;height:300px;background:#0ea5e9;bottom:-100px;right:-80px;animation-delay:3s; }
        .blob3 { width:250px;height:250px;background:#1d4ed8;top:50%;left:60%;transform:translate(-50%,-50%);animation-delay:6s; }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        /* 💎 Card */
        .card-box {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
            z-index: 2;
            color: #e2e8f0;
            animation: fadeIn 0.5s ease-in-out;
        }

        .card-box::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            pointer-events: none;
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .title {
            color: #38bdf8;
            font-weight: bold;
        }

        .details {
            text-align: left;
            margin-top: 20px;
        }

        .details p {
            margin: 6px 0;
            font-size: 15px;
        }

        hr {
            border-color: rgba(255,255,255,0.2);
        }

        /* 🔵 Buttons */
        .btn-custom {
            border-radius: 10px;
            padding: 10px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
            border: none;
        }

        .btn-custom:hover {
            transform: scale(1.05);
        }

        .btn-print {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            color: white;
        }

        .btn-logout {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            color: white;
        }

        .btn-home {
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: white;
        }

        .text-muted {
            color: #94a3b8 !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🖨️ Print view */
        @media print {
            body {
                background: white !important;
            }

            .btn-custom, a {
                display: none !important;
            }

            .card-box {
                box-shadow: none !important;
                background: white !important;
                color: black !important;
            }
        }
    </style>
</head>

<body>

<!-- 🔥 Background -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card-box">

    <h2 class="title">✅ Lab Booked Successfully!</h2>
    <p class="text-muted">📋 Lab Booking Details</p>
    <hr>

    <div class="details">
        <p><b>👨‍🏫 Teacher:</b> {{ booking.teacher_name }}</p>
        <p><b>🏫 Lab:</b> {{ booking.lab }}</p>
        <p><b>📅 Date:</b> {{ booking.date }}</p>
        <p><b>⏰ Time:</b> {{ booking.time }} - {{ booking.end_time }}</p>
        <p><b>⏳ Duration:</b> {{ booking.duration }} hour(s)</p>
    </div>

    <!-- 🖨 PRINT -->
    <button onclick="window.print()" class="btn btn-print btn-custom w-100">
        🖨 Print
    </button>

    <!-- 🏠 HOME -->
    <a href="{% url 'home' %}" class="btn btn-home btn-custom w-100">
        🏠 Back to Home
    </a>

    <!-- 🚪 LOGOUT -->
    <a href="{% url 'logout' %}" class="btn btn-logout btn-custom w-100">
        🚪 Logout
    </a>

</div>

</body>
</html>
