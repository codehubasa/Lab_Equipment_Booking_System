<!DOCTYPE html>
<html>
<head>
    <title>Book Full Lab</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0b1220, #1e293b, #2f3e52);
            overflow: hidden;
        }

        /* 🔥 Animated 3D Background */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: float 12s infinite ease-in-out;
        }

        .blob1 {
            width: 420px;
            height: 420px;
            background: #2563eb;
            top: -120px;
            left: -120px;
        }

        .blob2 {
            width: 350px;
            height: 350px;
            background: #0ea5e9;
            bottom: -120px;
            right: -80px;
            animation-delay: 3s;
        }

        .blob3 {
            width: 300px;
            height: 300px;
            background: #1d4ed8;
            top: 50%;
            left: 60%;
            transform: translate(-50%, -50%);
            animation-delay: 6s;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* 💎 Glass Card */
        .card {
            border-radius: 22px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            color: #e2e8f0;
            position: relative;
            z-index: 2;
        }

        /* ✨ Gradient Border Glow */
        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 22px;
            padding: 1px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            pointer-events: none;
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        h3 {
            font-weight: 700;
            color: #f1f5f9;
        }

        label {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        /* 🔥 Floating Input */
        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group-custom input,
        .input-group-custom select {
            width: 100%;
            padding: 14px 12px;
            border-radius: 12px;
            border: none;
            background: #f8fafc;
            box-shadow:
                inset 2px 2px 5px rgba(0,0,0,0.25),
                inset -2px -2px 5px rgba(255,255,255,0.9);
            transition: 0.3s;
        }

        .input-group-custom label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            pointer-events: none;
            transition: 0.3s;
        }

        .input-group-custom input:focus + label,
        .input-group-custom input:not(:placeholder-shown) + label,
        .input-group-custom select:focus + label,
        .input-group-custom select:valid + label {
            top: -8px;
            font-size: 11px;
            color: #38bdf8;
        }

        .input-group-custom input:focus,
        .input-group-custom select:focus {
            transform: translateY(-2px);
            box-shadow:
                0 6px 15px rgba(37,99,235,0.4),
                inset 1px 1px 3px rgba(0,0,0,0.2);
            outline: none;
        }

        /* 🔵 Button */
        button {
            border-radius: 12px !important;
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            border: none;
            font-weight: 600;
            transition: 0.3s ease;
            color: white;
            box-shadow: 0 6px 20px rgba(29,78,216,0.4);
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 30px rgba(29,78,216,0.6);
        }

        small {
            color: #94a3b8;
        }

        /* 🚫 FIXED ALERT (NO PINK) */
        .alert-danger {
            background: rgba(37, 99, 235, 0.15) !important;
            color: #bfdbfe !important;
            border: 1px solid rgba(59,130,246,0.4) !important;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

<!-- 🔥 Background -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="container">
    <div class="card p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="m-0">🏫 Book Full Lab</h3>
            <a href="{% url 'home' %}" class="btn text-white ps-0 pe-2" style="background: rgba(255,255,255,0.1); border-radius: 8px;">⬅ Back</a>
        </div>

        <!-- 🔔 Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="">
            {% csrf_token %}

            <div class="input-group-custom">
                <input type="text" name="teacher_name" required placeholder=" ">
                <label>Teacher Name</label>
            </div>

            <div class="input-group-custom">
                <select name="lab" required>
                    <option value="" disabled selected hidden></option>
                    <option value="physics">Physics Lab</option>
                    <option value="chemistry">Chemistry Lab</option>
                    <option value="biology">Biology Lab</option>
                    <option value="computer">Computer Lab</option>
                    <option value="geography">Geography Lab</option>
                </select>
                <label>Select Lab</label>
            </div>

            <div class="input-group-custom">
                <input type="date" name="date" required placeholder=" ">
                <label>Date</label>
            </div>

            <div class="input-group-custom">
                <input type="time" name="time" required placeholder=" ">
                <label>Start Time</label>
            </div>

            <div class="input-group-custom">
                <input type="number" name="duration" min="10" step="10" required placeholder=" ">
                <label>Duration (Minutes)</label>
                <small>Enter time like 40, 60, 90 minutes</small>
            </div>

            <button type="submit" class="btn w-100 mt-2">
                📅 Book Full Lab
            </button>

        </form>

    </div>
</div>

</body>
</html>
