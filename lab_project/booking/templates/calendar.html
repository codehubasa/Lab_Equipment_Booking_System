<!DOCTYPE html>
<html>
<head>
    <title>Booking Calendar</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FullCalendar -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0b1220, #1e293b, #2f3e52);
            overflow-y: auto;
            color: #e2e8f0;
        }

        /* 🔵 Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #0b1220; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            border-radius: 10px;
        }

        .container {
            position: relative;
            z-index: 2;
        }

        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: #1e293b; /* Provide dark text for internal calendar grid if necessary */
            backdrop-filter: blur(18px);
            margin-bottom: 20px;
            border-radius: 15px;
        }
        
        #calendar {
            background: white;
            padding: 20px;
            border-radius: 15px;
        }

        .fc .fc-toolbar-title {
            color: #1e293b;
        }

    </style>
</head>
<body>

<div class="container mt-4 pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-white">📅 Approved Bookings Calendar</h2>
        <a href="{% url 'home' %}" class="btn btn-outline-light">⬅ Back to Home</a>
    </div>

    <div class="card shadow p-2">
        <div id='calendar'></div>
    </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var rawEvents = {{ events_json|safe }};

    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      events: rawEvents
    });

    calendar.render();
  });
</script>

</body>
</html>
