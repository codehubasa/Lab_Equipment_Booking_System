<!DOCTYPE html>
<html>
<head>
    <title>Login - Lab Equipment Booking System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;

            /* 🖼️ BG IMAGE ADDED */
            background: 
                linear-gradient(rgba(11,18,32,0.8), rgba(30,41,59,0.85)),
                url('https://images.unsplash.com/photo-1523240795612-9a054b0db644');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            overflow-y: auto;
            overflow-x: hidden;
        }

        /* 🔥 Animated Background */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            animation: float 12s infinite ease-in-out;
            z-index: 0;
        }

        .blob1 { width:400px;height:400px;background:#2563eb;top:-100px;left:-100px; }
        .blob2 { width:300px;height:300px;background:#0ea5e9;bottom:-100px;right:-80px;animation-delay:3s; }
        .blob3 { width:250px;height:250px;background:#1d4ed8;top:50%;left:60%;transform:translate(-50%,-50%);animation-delay:6s; }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        .header {
            text-align: center;
            color: #e2e8f0;
            padding: 25px;
            position: relative;
            z-index: 2;
        }

        .image-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            position: relative;
            z-index: 2;
        }

        .image-row img {
            width: 250px;
            height: 140px;
            object-fit: cover;
            border-radius: 15px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }

        .login-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(18px);
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            color: #e2e8f0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            position: relative;
        }

        .login-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            pointer-events: none;
            -webkit-mask:
                linear-gradient(#000 0 0) content-box,
                linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .admin-card::before {
            background: linear-gradient(135deg, #eab308, #f59e0b); /* Yellow border */
        }

        input {
            padding: 12px !important;
            border-radius: 10px !important;
            border: none !important;
            background: #f8fafc;
            box-shadow:
                inset 2px 2px 5px rgba(0,0,0,0.25),
                inset -2px -2px 5px rgba(255,255,255,0.9);
        }

        input:focus {
            transform: translateY(-2px);
            box-shadow:
                0 6px 15px rgba(37,99,235,0.4),
                inset 1px 1px 3px rgba(0,0,0,0.2);
            outline: none;
        }

        .btn-login {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
            border: none;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(29,78,216,0.5);
        }

        .btn-admin {
            background: linear-gradient(135deg, #eab308, #f59e0b);
            color: black;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
            border: none;
            transition: 0.3s;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245,158,11,0.5);
        }

        .alert-danger {
            background: rgba(37, 99, 235, 0.15) !important;
            color: #bfdbfe !important;
            border: 1px solid rgba(59,130,246,0.4) !important;
        }
    </style>
</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="header">
    <h1>Lab Equipment Booking System</h1>
    <p>Smart Lab Management Portal</p>
</div>

<div class="image-row">
    <img src="https://images.unsplash.com/photo-1588072432836-e10032774350">
    <img src="https://images.unsplash.com/photo-1577896851231-70ef18881754">
    <img src="https://images.unsplash.com/photo-1596495578065-6e0763fa1178">
</div>

{% if messages %}
<div class="d-flex justify-content-center mt-3 position-relative z-2">
    {% for message in messages %}
        <div class="alert alert-danger text-center w-50">
            {{ message }}
        </div>
    {% endfor %}
</div>
{% endif %}

<div class="login-container">
    
    <!-- Student Portal Card -->
    <div class="login-card">
        <h4 class="text-center mb-4">🎓 Student Portal</h4>
        <form method="POST" action="">
            {% csrf_token %}
            <input type="hidden" name="login_type" value="student">
            
            <div class="mb-3">
                <input type="text" name="user_id" class="form-control" placeholder="Enter Full Name" required>
            </div>
            
            <div class="mb-3">
                <input type="text" name="roll" class="form-control" placeholder="Enter Roll Number" required>
            </div>

            <button type="submit" class="btn btn-login w-100">Access Equipment</button>
        </form>
    </div>

    <!-- Admin Portal Card -->
    <div class="login-card admin-card">
        <h4 class="text-center mb-4">🔐 Admin Portal</h4>
        <form method="POST" action="">
            {% csrf_token %}
            <input type="hidden" name="login_type" value="admin">

            <div class="mb-3">
                <input type="text" name="admin_user" class="form-control" placeholder="Admin Username" required>
            </div>

            <div class="mb-3">
                <input type="password" name="admin_pass" class="form-control" placeholder="Admin Password" required>
            </div>

            <button type="submit" class="btn btn-admin w-100">Dashboard Login</button>
        </form>
    </div>

</div>

</body>
</html>
